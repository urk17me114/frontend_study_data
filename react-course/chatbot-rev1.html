<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>


    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    
    
    
    <!-- 
    In react we dont use normal js instead we use an enhance version of the js called JSX or JSXML
    The advantage is that we can write HTML directly in js code -->
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    
    
    
    <!-- Babel is an ext library that complies and translates 
                                  other languages into js --> 
    <script type="text/babel"> 
        function ChatInput(){  
            return(
            <>    
                <input placeholder = "Send a message to chatbot" ></input>
                <button>Send</button>
            </>
            );
        } 


        function ChatMessage({message,imgsrc}){
            
          
             return(<div>   
                        {imgsrc === "robot" && <img src= "images/robot_img.png" width = "30"></img>}
                        {message} 
                        {imgsrc === "user" && <img src= "images/user_img.png" width = "30"></img>}
                        
                    </div>);
                    } 
                    
        
                        

    
    
        function ChatMessages(){
            const chatMessage = [{
                    message:"Hi",
                    imgsrc:"user",
                    id: "id1"
                },
                {
                    message:"How can I help you",
                    imgsrc:"robot",
                    id: "id2"
            },{
                    message:"I am fine.. Whats the weather today",
                    imgsrc:"user",
                    id: "id3"
                },
                {
                    message:"How can I help you",
                    imgsrc:"robot",
                    id: "id4"
            }]
            return ( 
                <>{chatMessage.map((chatMessage)=>{
                                                        return (
                                                            <
                                                        ChatMessage         message = {chatMessage.message} 
                                                                            imgsrc = {chatMessage.imgsrc}
                                                                            key = {chatMessage.id}
                                                            />
                                                        );
                                                }
                                )
                                            }</>)
            }
                   
    
        function App(){
             
                return( <>
                        <ChatInput ></ChatInput>
                        <ChatMessages />
                        
                    </>)}/* creating our own html element */
    
        const container = document.querySelector(".js-container");
        ReactDOM.createRoot(container).render(<App />);
    
    </script>
  </body>
</html>
